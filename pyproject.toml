[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "faceflash"
version = "0.1.0"
description = "Fast face retrieval via PCA+ITQ binary quantization — 50x less memory than HNSW at equal recall"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Raghavender Grudhanti", email = "raghavenderreddy1212@gmail.com"}
]
keywords = ["face-recognition", "vector-search", "binary-quantization", "arcface", "memory-efficient"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "numpy>=1.24",
    "onnxruntime>=1.16",
    "opencv-python>=4.8",
    "Pillow>=10.0",
    "tqdm>=4.60",
]

[project.optional-dependencies]
dev = ["pytest", "matplotlib", "pandas"]
benchmark = ["faiss-cpu>=1.7", "nmslib>=2.1", "usearch>=2.0"]
rust = ["maturin>=1.0"]

[project.urls]
Homepage = "https://github.com/***REMOVED***rudhanti/faceflash"

[tool.setuptools.packages.find]
include = ["faceflash*"]
