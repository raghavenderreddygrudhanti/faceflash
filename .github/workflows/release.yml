name: Release (build wheels + publish to PyPI)

# Builds prebuilt wheels for Linux / macOS / Windows so that
# `pip install faceflash` works WITHOUT a Rust toolchain on the user's machine.
# Triggers on a version tag (e.g. v0.1.0).
#
# Setup once:
#   - Create a PyPI API token, add it as the repo secret PYPI_API_TOKEN
#   - Tag a release:  git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-wheels:
    name: wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13
      - name: Build wheels with maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist -i python3.10 -i python3.11 -i python3.12 -i python3.13
          sccache: "true"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          manifest-path: rust/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
